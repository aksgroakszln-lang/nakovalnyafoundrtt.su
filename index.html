<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Foundry VTT — Скачать и настроить</title>

  <link rel="preload" as="image"
        href="https://www.dropbox.com/scl/fi/qyvvx56xsk8j1h81lmf7m/home-background.webp?rlkey=p6skz38llxdttgm6c13vxw9u5&st=5fzikec4&dl=1"
        fetchpriority="high"
  >

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
          href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&display=swap"
          rel="stylesheet"
          media="print"
          onload="this.media='all'"
  >

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html { scroll-behavior: smooth; }

    html, body {
      width: 100%;
      min-height: 100vh;
      background: radial-gradient(ellipse at center, #2a2418 0%, #141210 100%);
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      color: #e8e0d0;
      line-height: 1.6;
    }

    body.bg-loaded {
      background-image: url('https://www.dropbox.com/scl/fi/qyvvx56xsk8j1h81lmf7m/home-background.webp?rlkey=p6skz38llxdttgm6c13vxw9u5&st=5fzikec4&dl=1');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-attachment: fixed;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: rgba(20, 18, 14, 0.82);
      z-index: 0;
      backdrop-filter: blur(3px);
    }

    body {
      display: flex;
      justify-content: center;
      padding: 20px;
    }

    .page {
      position: relative;
      z-index: 1;
      max-width: 820px;
      width: 100%;
    }

    /* ===== ШАПКА ===== */
    .header {
      text-align: center;
      margin-bottom: 24px;
    }
    .header img {
      height: 48px;
      filter: drop-shadow(0 2px 6px rgba(0,0,0,0.5));
    }
    .header .subtitle {
      font-family: 'Cinzel', 'Times New Roman', serif;
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #c9a24e;
      margin-top: 4px;
    }

  
    /* ===== РАЗДЕЛ НАСТРОЙКИ ===== */
    .section-divider {
      text-align: center;
      margin-bottom: 20px;
    }
    .section-divider span {
      background: rgba(34, 31, 25, 0.85);
      border: 1px solid rgba(230, 126, 34, 0.3);
      padding: 8px 20px;
      border-radius: 20px;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: #f0a040;
      font-weight: 700;
    }

    .card {
      background: rgba(34, 31, 25, 0.85);
      border: 1px solid rgba(62, 56, 42, 0.8);
      border-radius: 12px;
      padding: 22px 24px;
      margin-bottom: 16px;
      backdrop-filter: blur(6px);
      box-shadow: 0 4px 16px rgba(0,0,0,0.5);
    }
    .card h2 {
      font-size: 1.1rem;
      font-weight: 700;
      color: #f5efe0;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .card h2 .num {
      background: #e67e22;
      color: #1a1915;
      width: 26px;
      height: 26px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.8rem;
      font-weight: 800;
      flex-shrink: 0;
    }
    .card h3 {
      font-size: 0.95rem;
      font-weight: 600;
      color: #f0a040;
      margin: 14px 0 6px;
    }
    .card p, .card li {
      font-size: 0.88rem;
      color: #b0a590;
      margin-bottom: 6px;
    }
    .card ul {
      list-style: none;
      padding-left: 0;
    }
    .card ul li {
      padding-left: 18px;
      position: relative;
    }
    .card ul li::before {
      content: '•';
      position: absolute;
      left: 4px;
      color: #e67e22;
    }
    .card a {
      color: #f0a040;
      text-decoration: underline;
      text-underline-offset: 2px;
    }
    .card a:hover { color: #f5c070; }

    .version-box {
      background: rgba(28, 25, 21, 0.7);
      border: 1px solid rgba(230, 126, 34, 0.3);
      border-radius: 8px;
      padding: 14px 16px;
      margin: 10px 0;
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 10px;
    }
    .version-box .ver {
      font-size: 1.3rem;
      font-weight: 700;
      color: #f0a040;
      background: rgba(230,126,34,0.12);
      padding: 2px 10px;
      border-radius: 5px;
      font-family: 'SF Mono', 'Consolas', monospace;
    }

    .warning {
      background: rgba(200, 50, 30, 0.12);
      border-left: 3px solid #c8321e;
      padding: 12px 16px;
      border-radius: 0 8px 8px 0;
      margin: 12px 0;
      font-size: 0.85rem;
      color: #e8c0a0;
    }
    .warning strong { color: #f08060; }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(180deg, #d47b29 0%, #b8621e 100%);
      border: 1px solid #e69735;
      color: #1a1915;
      font-weight: 700;
      font-size: 0.85rem;
      padding: 10px 18px;
      border-radius: 6px;
      text-decoration: none;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      transition: all 0.2s;
      box-shadow: 0 2px 8px rgba(0,0,0,0.4);
      cursor: pointer;
    }
    .btn:hover {
      background: linear-gradient(180deg, #e58a35 0%, #c96d22 100%);
      box-shadow: 0 4px 14px rgba(230, 126, 34, 0.3);
    }

    /* ===== ВЫЕЗЖАЮЩАЯ ПАНЕЛЬ С ВИДЕО ===== */
    .video-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }
    .video-btn-label {
      font-size: 0.8rem;
      color: #f08060;
      font-weight: 500;
      letter-spacing: 0.3px;
    }

    .video-toggle-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(200, 50, 30, 0.18);
      border: 1px solid #c8321e;
      color: #f08060;
      font-weight: 600;
      font-size: 0.78rem;
      padding: 6px 14px;
      border-radius: 20px;
      cursor: pointer;
      transition: all 0.3s;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .video-toggle-btn .arrow-icon {
      display: inline-block;
      transition: transform 0.35s ease;
      font-size: 0.7rem;
    }
    .video-toggle-btn.open {
      background: rgba(200, 50, 30, 0.35);
      border-color: #f08060;
      color: #fff;
    }
    .video-toggle-btn.open .arrow-icon { transform: rotate(180deg); }
    .video-toggle-btn:hover {
      background: rgba(200, 50, 30, 0.35);
      border-color: #f08060;
      color: #fff;
    }

    .video-panel {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.4s ease, margin 0.4s ease, border 0.4s ease;
      background: rgba(20, 18, 14, 0.7);
      border-radius: 8px;
      margin-top: 0;
      border: 1px solid transparent;
    }
    .video-panel.open {
      max-height: 600px;
      margin-top: 12px;
      margin-bottom: 8px;
      border: 1px solid rgba(200, 50, 30, 0.4);
    }
    .video-wrapper {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 9;
    }
    .video-wrapper iframe {
      width: 100%;
      height: 100%;
      border: none;
      border-radius: 6px;
    }


</html>
